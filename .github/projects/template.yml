## 🔄 自動化ワークフロー

### Issue作成時の自動設定
```yaml
workflow_name: "Auto-assign new issues"
trigger: "issue_created"
actions:
  - set_field:
      field: "Status"
      value: "Backlog"
  - set_field:
      field: "Priority"
      value: "Medium"
  - add_label: "needs-triage"
```

### PR作成時の自動設定
```yaml
workflow_name: "Auto-assign new PRs"
trigger: "pull_request_created"
actions:
  - set_field:
      field: "Status"
      value: "In Review"
  - link_issue: "auto"
```

### PR承認時の自動設定
```yaml
workflow_name: "Auto-complete merged PRs"
trigger: "pull_request_merged"
actions:
  - set_field:
      field: "Status"
      value: "Done"
  - archive_item: true
```

