# DriveRev Project Template Configuration

## 🎯 プロジェクトテンプレート

### 基本設定
```yaml
name: "DriveRev Development"
description: "レンタカーサービス DriveRev の開発プロジェクト"
template: "kanban"
visibility: "public"
```

### 初期ビュー設定

#### 1. Kanban Board
```yaml
view_type: "board"
title: "📋 Development Board"
group_by: "Status"
sort_by: "Priority"
filters:
  - "is:open"
  - "is:issue"
```

#### 2. Roadmap View
```yaml
view_type: "roadmap"
title: "🗓️ Release Roadmap"
group_by: "Milestone"
timeline_field: "Target Release"
filters:
  - "is:open"
  - "is:issue"
```

#### 3. Table View
```yaml
view_type: "table"
title: "📊 Detailed View"
sort_by: "Priority"
filters:
  - "is:open"
```

