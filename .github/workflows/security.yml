name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 毎日午前3時（JST）に実行
    - cron: "0 18 * * *"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FORCE_CACHE_REFRESH: "true"

jobs:
  # 依存関係の脆弱性スキャン
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependency audit
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate || echo "Found vulnerabilities, generating report..."
          npm audit --json > npm-audit.json || echo "Generated audit report"

      - name: Upload frontend audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-audit-report
          path: frontend/npm-audit.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Backend dependency audit
        working-directory: ./backend
        run: |
          pip install safety
          safety check --json --output safety-report.json || echo "Generated safety report"

      - name: Upload backend audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-audit-report
          path: backend/safety-report.json

  # コードセキュリティスキャン
  code-security-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit semgrep

      - name: Bandit security scan
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json || echo "Generated bandit report"
          bandit -r backend/app/ -ll || echo "Bandit scan completed"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Semgrep security scan
        run: |
          semgrep --config=auto --json --output=semgrep-report.json backend/ || echo "Generated semgrep report"
          semgrep --config=auto backend/ || echo "Semgrep scan completed"

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: semgrep-report.json

  # GitHub CodeQL分析
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node.js (for JavaScript analysis)
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        if: matrix.language == 'javascript'
        working-directory: ./frontend
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Podman イメージのセキュリティスキャン
  docker-security-scan:
    name: Podman Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure Docker
        run: |
          echo "Docker is already configured in GitHub Actions"

      - name: Build backend image with Docker
        run: |
          docker build -t driverev-backend:security-scan ./backend

      - name: Build frontend image with Docker
        run: |
          docker build -t driverev-frontend:security-scan ./frontend

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "driverev-backend:security-scan"
          format: "json"
          output: "trivy-backend-results.json"
          scan-type: "image"
        continue-on-error: true

      - name: Upload Trivy scan results (Backend)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-report
          path: "trivy-backend-results.json"

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "driverev-frontend:security-scan"
          format: "json"
          output: "trivy-frontend-results.json"
        continue-on-error: true

      - name: Upload Trivy scan results (Frontend)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-report
          path: "trivy-frontend-results.json"

  # シークレットスキャン
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # セキュリティレポートの統合
  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs:
      [
        dependency-scan,
        code-security-scan,
        codeql-analysis,
        docker-security-scan,
        secret-scan,
      ]
    if: always()

    steps:
      - name: Generate security report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-report.md
          echo "- Code Security Scan: ${{ needs.code-security-scan.result }}" >> security-report.md
          echo "- CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> security-report.md
          echo "- Podman Security Scan: ${{ needs.docker-security-scan.result }}" >> security-report.md
          echo "- Secret Detection: ${{ needs.secret-scan.result }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Recommendations" >> security-report.md
          echo "1. Review all security findings" >> security-report.md
          echo "2. Update vulnerable dependencies" >> security-report.md
          echo "3. Address code security issues" >> security-report.md
          echo "4. Rotate any exposed secrets" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./frontend/coverage
          flags: security-scan
          name: security-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
