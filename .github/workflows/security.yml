name: Security Scan

# セキュリティベストプラクティス: デフォルト権限を制限し、各ジョブで明示的に付与
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main] # Main へのPRのみで包括的チェック（Develop での重複を回避）
    paths:
      # セキュリティリスクのあるファイル変更時のみ実行
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**" # ワークフロー変更もセキュリティスキャン対象（悪意のある変更検出）
      # ドキュメントのみの変更は除外（セキュリティリスクなし）
      - "!**/*.md"
      - "!docs/**"
  schedule:
    # 毎週月曜日午前3時（JST）に実行
    - cron: "0 18 * * 1"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FORCE_CACHE_REFRESH: "true"

jobs:
  # 変更検知 - どのコンポーネントが変更されたかを判定
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      dependencies: ${{ steps.filter.outputs.dependencies }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - '**/Dockerfile'
            dependencies:
              - 'backend/requirements.txt'
              - 'frontend/package*.json'

  # 依存関係の脆弱性スキャン
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependency audit
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate || echo "Found vulnerabilities, generating report..."
          npm audit --json > npm-audit.json || echo "Generated audit report"

      - name: Upload frontend audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-audit-report
          path: frontend/npm-audit.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Backend dependency audit
        working-directory: ./backend
        run: |
          pip install safety
          # 必ずレポートファイルを生成（エラー時も含む）
          safety check --json > safety-report.json || true
          # ファイルが存在しない場合はダミーファイルを作成
          if [ ! -f safety-report.json ]; then
            echo '{"errors": ["Failed to generate safety report"]}' > safety-report.json
          fi
          # ファイルが空の場合も対応
          if [ ! -s safety-report.json ]; then
            echo '{"vulnerabilities": [], "meta": {"timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}}' > safety-report.json
          fi
          # 結果を表示（エラーは無視）
          safety check || echo "⚠️  Vulnerabilities found, check the report for details"

      - name: Upload backend audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-audit-report
          path: backend/safety-report.json

  # コードセキュリティスキャン
  code-security-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit semgrep

      - name: Bandit security scan
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json || echo "Generated bandit report"
          bandit -r backend/app/ -ll || echo "Bandit scan completed"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Semgrep security scan
        run: |
          semgrep --config=auto --json --output=semgrep-report.json backend/ || echo "Generated semgrep report"
          semgrep --config=auto backend/ || echo "Semgrep scan completed"

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: semgrep-report.json

  # GitHub CodeQL分析
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node.js (for JavaScript analysis)
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        if: matrix.language == 'javascript'
        working-directory: ./frontend
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Docker イメージのセキュリティスキャン
  # Phase 7: GHCR から Pull してスキャン（ビルドなし）
  docker-security-scan:
    name: Docker Security Scan (GHCR)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.docker == 'true' ||
      github.event_name == 'schedule'
    permissions:
      contents: read
      packages: read  # GHCR から Pull するための権限

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Login to GHCR (Public リポジトリでも明示的にログイン)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Phase 7: ビルド不要、GHCR から Pull のみ
      # Note: build-and-push ワークフローで既にビルド済み
      - name: Pull Backend image from GHCR
        run: |
          # 最新の Backend イメージを Pull
          # Public リポジトリなので認証なしでも可能だが、rate limit 回避のためログイン
          docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:latest || \
          docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:${{ github.sha }} || \
          echo "⚠️  Backend image not found in GHCR - may need to run build-and-push workflow first"

      - name: Pull Frontend image from GHCR
        run: |
          # 最新の Frontend イメージを Pull (CI version)
          docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:latest-ci || \
          docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:${{ github.sha }}-ci || \
          echo "⚠️  Frontend image not found in GHCR - may need to run build-and-push workflow first"

      # Trivy スキャン: GHCR イメージを直接スキャン
      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/driverev-backend:latest"
          format: "json"
          output: "trivy-backend-results.json"
          scan-type: "image"
          # Security Gate: 脆弱性検出時にジョブを失敗させる
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        continue-on-error: false  # Phase 7: セキュリティゲートとして機能

      - name: Upload Trivy scan results (Backend)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-report
          path: "trivy-backend-results.json"

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/driverev-frontend:latest-ci"
          format: "json"
          output: "trivy-frontend-results.json"
          scan-type: "image"
          # Security Gate: 脆弱性検出時にジョブを失敗させる
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        continue-on-error: false  # Phase 7: セキュリティゲートとして機能

      - name: Upload Trivy scan results (Frontend)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-report
          path: "trivy-frontend-results.json"

  # シークレットスキャン (PR時のみ)
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

  # セキュリティレポートの統合
  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    needs:
      [
        dependency-scan,
        code-security-scan,
        codeql-analysis,
        docker-security-scan,
      ]
    # secret-scan はPR時のみ実行のため needs から除外（schedule/push 実行時の整合性確保）
    if: always()

    steps:
      - name: Generate security report (base)
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-report.md
          echo "- Code Security Scan: ${{ needs.code-security-scan.result }}" >> security-report.md
          echo "- CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> security-report.md
          echo "- Podman Security Scan: ${{ needs.docker-security-scan.result }}" >> security-report.md

      - name: Add secret scan result (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "- Secret Detection: Executed in parallel (check Secret Detection job)" >> security-report.md

      - name: Add secret scan result (other events)
        if: github.event_name != 'pull_request'
        run: |
          echo "- Secret Detection: Skipped (only runs on pull requests)" >> security-report.md

      - name: Add recommendations
        run: |
          echo "" >> security-report.md
          echo "## Recommendations" >> security-report.md
          echo "1. Review all security findings" >> security-report.md
          echo "2. Update vulnerable dependencies" >> security-report.md
          echo "3. Address code security issues" >> security-report.md
          echo "4. Rotate any exposed secrets (if Secret Detection found issues)" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
