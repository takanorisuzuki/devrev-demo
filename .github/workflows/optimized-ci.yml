name: CI/CD Pipeline

permissions: {}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run on"
        required: false
        default: "develop"
      skip_deploy:
        description: "Skip deployment step"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  # Security: Test credentials for CI environment only (not used in production)
  CI_POSTGRES_PASSWORD: postgres123
  CI_SECRET_KEY: test-secret-key
  FORCE_CACHE_REFRESH: "true"
  # Docker image configuration
  GHCR_REGISTRY: ghcr.io
  # Frontend build args (DRY: defined once, used everywhere)
  FRONTEND_BUILD_ARGS: |
    NEXT_PUBLIC_APP_ENV=production
    NEXT_PUBLIC_APP_NAME=DriveRev
    NEXT_PUBLIC_DEFAULT_LOCALE=ja
    NEXT_PUBLIC_SUPPORTED_LOCALES=["ja", "en"]

jobs:
  # 変更検知 - どのコンポーネントが変更されたかを判定
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'backend/requirements.txt'
            frontend:
              - 'frontend/**'
              - 'frontend/package*.json'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - '.github/compose.ci.yml'
            ci:
              - '.github/workflows/**'

  # Backend品質チェック（ブランチプロテクション要件）
  backend-quality:
    name: Backend Code Quality v2
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        working-directory: ./backend
        run: flake8 app/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run black
        working-directory: ./backend
        run: black --check app/

      - name: Run isort
        working-directory: ./backend
        run: isort --check-only --profile=black app/

  # Frontend品質チェック
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run lint
        working-directory: ./frontend
        run: npm run lint

      - name: Run type-check
        working-directory: ./frontend
        run: npm run type-check

  # フロントエンドテスト（ビルドは Docker ステージで実行）
  frontend-build-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-quality]
    if: |
      always() &&
      !cancelled() &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) &&
      (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped') &&
      (needs.detect-changes.outputs.frontend == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      # Note: ビルドは Docker Integration ステージで実行（重複ビルド回避）
      # 理由: Next.js は環境変数（NEXT_PUBLIC_API_URL）に依存するため、
      # CI用と本番用で異なるビルドが必要。Docker ビルドで一元管理。

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # バックエンドテスト（ビルドは Docker ステージで実行）
  backend-build-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-quality]
    if: |
      always() &&
      !cancelled() &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) &&
      (needs.backend-quality.result == 'success' || needs.backend-quality.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true')
    permissions:
      contents: read
    # Note: Pytestでユニット/統合テストを実行。本番用Dockerイメージビルドは
    # Docker Integration ステージで実行（重複ビルド回避、キャッシュ最適化）

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: driverev_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/driverev_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # Docker統合ビルド・テスト（実際のビルドを実行）
  # 最適化ポイント:
  # 1. Frontend/Backend の本番用 Docker イメージをここで一度だけビルド
  # 2. GitHub Actions キャッシュ（type=gha）で依存関係を高速化
  # 3. ビルド成果物を GHCR にプッシュして再利用可能に
  # 4. 前段の *-build-test ジョブではテストのみ実行（重複ビルド回避）
  docker-integration:
    name: Docker Build & Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build-test, backend-build-test]
    if: |
      always() &&
      !cancelled() &&
      (needs.frontend-build-test.result == 'success' || needs.frontend-build-test.result == 'skipped') &&
      (needs.backend-build-test.result == 'success' || needs.backend-build-test.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true') &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: write # GHCR push用
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_with_sha: ${{ steps.version.outputs.version_with_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Get semantic version for image tagging
      - name: Get version
        id: version
        run: |
          chmod +x scripts/get-version.sh
          VERSION=$(./scripts/get-version.sh)
          VERSION_WITH_SHA=$(./scripts/get-version.sh --with-sha)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_with_sha=$VERSION_WITH_SHA" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"
          echo "📌 Version with SHA: $VERSION_WITH_SHA"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend: ビルド & GHCR push
      # 最適化: GitHub Actions キャッシュでレイヤーを再利用（pip install 高速化）
      # backend-build-test での pytest 実行後、ここで本番用イメージを一度だけビルド
      # 条件: バックエンドまたはDockerfileが変更された場合のみビルド
      - name: Build and push backend image
        id: build-backend
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            driverev-backend:test
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-backend:{2}', env.GHCR_REGISTRY, github.repository_owner, steps.version.outputs.version) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-backend:{2}', env.GHCR_REGISTRY, github.repository_owner, steps.version.outputs.version_with_sha) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-backend:{2}', env.GHCR_REGISTRY, github.repository_owner, github.sha) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-backend:latest', env.GHCR_REGISTRY, github.repository_owner) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend: ビルド & GHCR push (CI用 - テスト環境)
      # 最適化: GitHub Actions キャッシュで npm install と Next.js ビルドを高速化
      # 注意: CI用は localhost:8000 を使用。本番用は deploy ジョブで動的IPを使って再ビルド必要
      # 理由: NEXT_PUBLIC_API_URL はビルド時に埋め込まれるため、環境ごとに異なるビルドが必須
      # 条件: フロントエンドまたはDockerfileが変更された場合のみビルド
      - name: Build and push frontend image (CI)
        id: build-frontend-ci
        if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            driverev-frontend:test
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-frontend:{2}', env.GHCR_REGISTRY, github.repository_owner, steps.version.outputs.version) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-frontend:{2}', env.GHCR_REGISTRY, github.repository_owner, steps.version.outputs.version_with_sha) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-frontend:{2}', env.GHCR_REGISTRY, github.repository_owner, github.sha) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/driverev-frontend:latest', env.GHCR_REGISTRY, github.repository_owner) || '' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            ${{ env.FRONTEND_BUILD_ARGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services with Docker Compose
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 240 backend

      - name: Run integration tests
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" exec backend curl -fsS http://localhost:8000/health
          echo "Backend health check passed"

      - name: Cleanup
        if: always() && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true')
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" down

  # コード解析（オプション、スケジュール実行など）
  code-analysis:
    name: Extended Code Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install analysis tools
        run: |
          pip install radon xenon bandit
          pip install -r backend/requirements.txt

      - name: Run complexity analysis
        continue-on-error: true
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc backend/app/ -a
          echo "=== Maintainability Index ==="
          radon mi backend/app/ -a

      - name: Run security analysis
        continue-on-error: true
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-analysis-report-${{ github.sha }}
          path: |
            bandit-report.json

  # デプロイメント（条件分岐：develop→staging, main→production）
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [detect-changes, docker-integration]
    if: >
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || !inputs.skip_deploy) &&
      (needs.docker-integration.result == 'success') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true')
    permissions:
      contents: read
      packages: write # GHCR push用

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Set deployment environment (production only)
      - name: Set deployment environment
        id: env
        run: |
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "vm_name=free-vm01" >> $GITHUB_OUTPUT

      # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: compute

      # Get production VM IP
      - name: Get GCE external IP
        id: gce-ip
        run: |
          IP=$(gcloud compute instances describe free-vm01 \
            --zone=us-west1-b \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          if [ -z "$IP" ]; then
            echo "VM external IP not found (is the VM running?)" >&2
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Using production VM IP: $IP"

      # Setup Docker Buildx for multi-platform builds
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build production frontend image with dynamic API URL
      # 🔄 重要: ここでの再ビルドは必須（重複ではない）
      # 理由:
      #   - Next.js の NEXT_PUBLIC_* 環境変数はビルド時に静的に埋め込まれる
      #   - CI用は localhost:8000、本番用は動的IPが必要
      #   - GCE VMのIPはデプロイ時にしか取得できない
      # 最適化:
      #   - GitHub Actions キャッシュで npm_modules と .next/cache を再利用
      #   - 実際のビルド時間は大幅に短縮される（初回の30-50%程度）
      - name: Build production frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/driverev-frontend:${{ needs.docker-integration.outputs.version }}-prod
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/driverev-frontend:${{ needs.docker-integration.outputs.version_with_sha }}-prod
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/driverev-frontend:${{ github.sha }}-prod
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/driverev-frontend:latest-prod
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ steps.gce-ip.outputs.ip }}:8000
            ${{ env.FRONTEND_BUILD_ARGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Prepare production app directory
      - name: Prepare production app directory
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euxo pipefail
            rm -rf ~/app
            mkdir -p ~/app

      - name: Copy compose file and scripts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: ".github/compose.ci.yml,scripts/generate-production-env.sh,scripts/cleanup-old-images.sh,scripts/rollback.sh"
          target: "~/app"
          strip_components: 0

      # Create secure environment file on VM
      - name: Create secure environment file
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/app

            # Create .env.secrets securely (not exposed in process list or logs)
            cat > .env.secrets << 'SECRETS_EOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            SECRETS_EOF

            chmod 600 .env.secrets
            echo "✅ Secure environment file created"

      - name: Deploy and start services
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/app

            # Load secrets from secure file
            source .env.secrets
            export DB_PASSWORD SECRET_KEY EMAIL_HOST EMAIL_USER EMAIL_PASSWORD

            # Generate production environment file
            VM_IP="${{ steps.gce-ip.outputs.ip }}"
            echo "🔧 Generating production .env with IP: $VM_IP"
            chmod +x scripts/generate-production-env.sh
            ./scripts/generate-production-env.sh "$VM_IP"

            # Cleanup secrets file immediately after use
            rm -f .env.secrets

            # Login to GHCR securely
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null

            # Pull images from GHCR with version tagging
            BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/driverev-backend"
            FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/driverev-frontend"
            VERSION="${{ needs.docker-integration.outputs.version }}"
            VERSION_WITH_SHA="${{ needs.docker-integration.outputs.version_with_sha }}"
            CURRENT_SHA="${{ github.sha }}"

            echo "🔍 Pulling images for version: $VERSION"
            echo "📌 Version with SHA: $VERSION_WITH_SHA"

            # Pull and tag backend image (priority: version-sha > version > sha > latest)
            if docker pull "$BACKEND_IMAGE:$VERSION_WITH_SHA" 2>/dev/null; then
              echo "✅ Backend image: $VERSION_WITH_SHA"
              docker tag "$BACKEND_IMAGE:$VERSION_WITH_SHA" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$VERSION_WITH_SHA" "driverev-backend:test"
            elif docker pull "$BACKEND_IMAGE:$VERSION" 2>/dev/null; then
              echo "✅ Backend image: $VERSION"
              docker tag "$BACKEND_IMAGE:$VERSION" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$VERSION" "driverev-backend:test"
            elif docker pull "$BACKEND_IMAGE:$CURRENT_SHA" 2>/dev/null; then
              echo "⚠️  Using SHA-tagged backend image: $CURRENT_SHA"
              docker tag "$BACKEND_IMAGE:$CURRENT_SHA" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$CURRENT_SHA" "driverev-backend:test"
            else
              echo "⚠️  Fallback to latest backend image"
              docker pull "$BACKEND_IMAGE:latest"
              docker tag "$BACKEND_IMAGE:latest" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:latest" "driverev-backend:test"
            fi

            # Pull and tag frontend image (prod version)
            if docker pull "$FRONTEND_IMAGE:$VERSION_WITH_SHA-prod" 2>/dev/null; then
              echo "✅ Frontend image: $VERSION_WITH_SHA-prod"
              docker tag "$FRONTEND_IMAGE:$VERSION_WITH_SHA-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$VERSION_WITH_SHA-prod" "driverev-frontend:test"
            elif docker pull "$FRONTEND_IMAGE:$VERSION-prod" 2>/dev/null; then
              echo "✅ Frontend image: $VERSION-prod"
              docker tag "$FRONTEND_IMAGE:$VERSION-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$VERSION-prod" "driverev-frontend:test"
            elif docker pull "$FRONTEND_IMAGE:$CURRENT_SHA-prod" 2>/dev/null; then
              echo "⚠️  Using SHA-tagged frontend image: $CURRENT_SHA-prod"
              docker tag "$FRONTEND_IMAGE:$CURRENT_SHA-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$CURRENT_SHA-prod" "driverev-frontend:test"
            else
              echo "⚠️  Fallback to latest-prod frontend image"
              docker pull "$FRONTEND_IMAGE:latest-prod"
              docker tag "$FRONTEND_IMAGE:latest-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:latest-prod" "driverev-frontend:test"
            fi

            # Deploy to production
            PROJECT="devrev-production"
            echo "🚀 Starting deployment..."

            # Stop existing deployment
            docker compose -f .github/compose.ci.yml -p "$PROJECT" down --remove-orphans || true

            # Start new deployment
            set -a
            source .env
            set +a
            docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 300

            echo "✅ Deployment complete!"
            echo "🌐 Frontend: http://$VM_IP:3000"
            echo "🔌 Backend API: http://$VM_IP:8000"

            # Show status
            docker compose -f .github/compose.ci.yml -p "$PROJECT" ps

            # Cleanup old images (keep most recent 3 versions)
            echo "🧹 Cleaning up old Docker images..."
            chmod +x scripts/cleanup-old-images.sh
            ./scripts/cleanup-old-images.sh 3 || echo "⚠️  Image cleanup skipped (non-critical)"

            echo "✅ Production deployment completed successfully"
            echo "📦 Current version: $VERSION"

  # 品質レポート生成
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs:
      [
        backend-quality,
        frontend-quality,
        frontend-build-test,
        backend-build-test,
        docker-integration,
      ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Generate quality summary
        run: |
          echo "# CI/CD Quality Summary" > summary.md
          echo "Generated on: $(date)" >> summary.md
          echo "" >> summary.md
          echo "## Job Results" >> summary.md
          echo "- Backend Code Quality: ${{ needs.backend-quality.result }}" >> summary.md
          echo "- Frontend Code Quality: ${{ needs.frontend-quality.result }}" >> summary.md
          echo "- Frontend Build & Test: ${{ needs.frontend-build-test.result }}" >> summary.md
          echo "- Backend Tests & Build: ${{ needs.backend-build-test.result }}" >> summary.md
          echo "- Docker Integration: ${{ needs.docker-integration.result }}" >> summary.md
          echo "" >> summary.md
          echo "## Performance Metrics" >> summary.md
          echo "- Total execution time: $(date)" >> summary.md

      - name: Upload quality summary
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary-${{ github.sha }}
          path: summary.md
