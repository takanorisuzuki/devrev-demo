name: CI/CD Pipeline

permissions: {}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run on"
        required: false
        default: "develop"
      skip_deploy:
        description: "Skip deployment step"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  # Security: Test credentials for CI environment only (not used in production)
  CI_POSTGRES_PASSWORD: postgres123
  CI_SECRET_KEY: test-secret-key
  FORCE_CACHE_REFRESH: "true"
  # Docker image configuration
  GHCR_REGISTRY: ghcr.io
  # Frontend build args (DRY: defined once, used everywhere)
  FRONTEND_BUILD_ARGS: |
    NEXT_PUBLIC_APP_ENV=production
    NEXT_PUBLIC_APP_NAME=DriveRev
    NEXT_PUBLIC_DEFAULT_LOCALE=ja
    NEXT_PUBLIC_SUPPORTED_LOCALES=["ja", "en"]

jobs:
  # 変更検知 - どのコンポーネントが変更されたかを判定
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'backend/requirements.txt'
            frontend:
              - 'frontend/**'
              - 'frontend/package*.json'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - '.github/compose.ci.yml'
            ci:
              - '.github/workflows/**'

  # Backend品質チェック（ブランチプロテクション要件）
  backend-quality:
    name: Backend Code Quality v2
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        working-directory: ./backend
        run: flake8 app/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run black
        working-directory: ./backend
        run: black --check app/

      - name: Run isort
        working-directory: ./backend
        run: isort --check-only --profile=black app/

  # Frontend品質チェック
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run lint
        working-directory: ./frontend
        run: npm run lint

      - name: Run type-check
        working-directory: ./frontend
        run: npm run type-check

  # フロントエンドテスト（ビルドは Docker ステージで実行）
  frontend-build-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-quality]
    if: |
      always() &&
      !cancelled() &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) &&
      (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped') &&
      (needs.detect-changes.outputs.frontend == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      # Note: ビルドは Docker Integration ステージで実行（重複ビルド回避）
      # 理由: Next.js は環境変数（NEXT_PUBLIC_API_URL）に依存するため、
      # CI用と本番用で異なるビルドが必要。Docker ビルドで一元管理。

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage

  # バックエンドテスト（ビルドは Docker ステージで実行）
  backend-build-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-quality]
    if: |
      always() &&
      !cancelled() &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) &&
      (needs.backend-quality.result == 'success' || needs.backend-quality.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true')
    permissions:
      contents: read
    # Note: Pytestでユニット/統合テストを実行。本番用Dockerイメージビルドは
    # Docker Integration ステージで実行（重複ビルド回避、キャッシュ最適化）

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: driverev_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/driverev_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend
          flags: backend
          name: backend-coverage

  # Docker統合テスト（GHCR から Pull のみ）
  # Phase 7 最適化ポイント:
  # 1. build-and-push ワークフローで既にビルド済み（重複ビルド排除）
  # 2. GHCR から Pull のみ（ビルド時間ゼロ）
  # 3. ローカルタグ付与で docker compose と互換性を保つ
  # 4. 前段の *-build-test ジョブではテストのみ実行
  docker-integration:
    name: Docker Integration Tests (GHCR Pull)
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build-test, backend-build-test]
    if: |
      always() &&
      !cancelled() &&
      (needs.frontend-build-test.result == 'success' || needs.frontend-build-test.result == 'skipped') &&
      (needs.backend-build-test.result == 'success' || needs.backend-build-test.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true') &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: read # Phase 7: GHCR Pull 用（write 不要）
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_with_sha: ${{ steps.version.outputs.version_with_sha }}
      backend_version_with_sha: ${{ steps.version.outputs.backend_version_with_sha }}
      frontend_version_with_sha: ${{ steps.version.outputs.frontend_version_with_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for component-specific SHA detection

      # Wait for build-and-push workflow to complete
      # This ensures images are available in GHCR before pulling
      - name: Wait for build-and-push workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏳ Waiting for build-and-push workflow to complete..."
          
          # For PRs, use head SHA instead of merge commit SHA
          TARGET_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "🔍 Looking for build-and-push workflow with SHA: $TARGET_SHA"
          
          # Wait up to 10 minutes for build-and-push workflow
          TIMEOUT=600
          ELAPSED=0
          INTERVAL=10
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Get the latest build-and-push workflow run for this commit
            # Search by branch instead of commit for better reliability
            RUN_STATUS=$(gh run list \
              --workflow=build-and-push.yml \
              --branch=${{ github.head_ref || github.ref_name }} \
              --limit 1 \
              --json status,conclusion,headSha \
              --jq '.[0] | select(.headSha == "'$TARGET_SHA'") | "\(.status):\(.conclusion)"' 2>/dev/null || echo "not_found")
            
            if [ "$RUN_STATUS" = "completed:success" ]; then
              echo "✅ build-and-push workflow completed successfully"
              # Wait additional 10 seconds for GHCR manifest propagation
              echo "⏳ Waiting 10s for GHCR manifest propagation..."
              sleep 10
              break
            elif [[ "$RUN_STATUS" == completed:* ]]; then
              echo "❌ build-and-push workflow completed with status: $RUN_STATUS"
              exit 1
            else
              echo "⏳ build-and-push status: $RUN_STATUS (${ELAPSED}s elapsed)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            fi
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️  Timeout waiting for build-and-push workflow"
            echo "Proceeding anyway - images might be available from previous builds"
          fi

      # Get semantic version for image tagging
      - name: Get version
        id: version
        run: |
          chmod +x scripts/get-version.sh
          VERSION=$(./scripts/get-version.sh)
          VERSION_WITH_SHA=$(./scripts/get-version.sh --with-sha)

          # Get component-specific SHAs for accurate change tracking
          # This ensures we only rebuild when the actual component changes
          BACKEND_SHA=$(git log -1 --format=%H -- backend/ || echo "none")
          FRONTEND_SHA=$(git log -1 --format=%H -- frontend/ || echo "none")

          # Create component-specific version tags
          BACKEND_VERSION_WITH_SHA="${VERSION}-${BACKEND_SHA:0:7}"
          FRONTEND_VERSION_WITH_SHA="${VERSION}-${FRONTEND_SHA:0:7}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_with_sha=$VERSION_WITH_SHA" >> $GITHUB_OUTPUT
          echo "backend_version_with_sha=$BACKEND_VERSION_WITH_SHA" >> $GITHUB_OUTPUT
          echo "frontend_version_with_sha=$FRONTEND_VERSION_WITH_SHA" >> $GITHUB_OUTPUT

          echo "📌 Version: $VERSION"
          echo "📌 Version with SHA: $VERSION_WITH_SHA"
          echo "📌 Backend Version: $BACKEND_VERSION_WITH_SHA"
          echo "📌 Frontend Version: $FRONTEND_VERSION_WITH_SHA"

      # Phase 7: ビルド不要、GHCR から Pull のみ
      # Note: build-and-push ワークフローで既にビルド済み
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend イメージを GHCR から Pull
      - name: Pull Backend image from GHCR
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          # Public リポジトリなので認証なしでも可能だが、rate limit 回避のためログイン済み
          # For PRs, use head SHA instead of merge commit SHA
          TARGET_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          # Get component-specific SHA for Backend
          BACKEND_SHA=$(git log -1 --format=%H -- backend/ 2>/dev/null || echo "none")
          BACKEND_TAG="backend-sha-${BACKEND_SHA:0:7}"
          
          echo "📦 Pulling Backend image from GHCR..."
          echo "   Event: ${{ github.event_name }}"
          echo "   Trying HEAD SHA: $TARGET_SHA"
          echo "   Trying Component SHA: $BACKEND_TAG"
          
          # PRの場合は latest をスキップ（常に最新のビルドをテスト）
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "   Strategy: PR - Skip latest, use commit-specific tags"
            if docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:$TARGET_SHA 2>/dev/null; then
              echo "✅ Pulled Backend:$TARGET_SHA"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:$TARGET_SHA driverev-backend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:$BACKEND_TAG 2>/dev/null; then
              echo "✅ Pulled Backend:$BACKEND_TAG (component-specific)"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:$BACKEND_TAG driverev-backend:test
            else
              echo "❌ Backend image not found in GHCR"
              echo "⚠️  Tried tags: $TARGET_SHA, $BACKEND_TAG"
              exit 1
            fi
          else
            echo "   Strategy: main/develop - Use latest if available"
            if docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:latest 2>/dev/null; then
              echo "✅ Pulled Backend:latest"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:latest driverev-backend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:$TARGET_SHA 2>/dev/null; then
              echo "✅ Pulled Backend:$TARGET_SHA"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:$TARGET_SHA driverev-backend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:$BACKEND_TAG 2>/dev/null; then
              echo "✅ Pulled Backend:$BACKEND_TAG (component-specific)"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:$BACKEND_TAG driverev-backend:test
            else
              echo "❌ Backend image not found in GHCR"
              echo "⚠️  Tried tags: latest, $TARGET_SHA, $BACKEND_TAG"
              exit 1
            fi
          fi
          echo "🏷️  Tagged as driverev-backend:test for docker compose"

      # Frontend イメージを GHCR から Pull (CI version)
      - name: Pull Frontend image from GHCR
        if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          # For PRs, use head SHA instead of merge commit SHA
          TARGET_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          # Get component-specific SHA for Frontend
          FRONTEND_SHA=$(git log -1 --format=%H -- frontend/ 2>/dev/null || echo "none")
          FRONTEND_TAG="frontend-sha-${FRONTEND_SHA:0:7}-ci"
          
          echo "📦 Pulling Frontend CI image from GHCR..."
          echo "   Event: ${{ github.event_name }}"
          echo "   Trying HEAD SHA: $TARGET_SHA"
          echo "   Trying Component SHA: $FRONTEND_TAG"
          
          # PRの場合は latest-ci をスキップ（常に最新のビルドをテスト）
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "   Strategy: PR - Skip latest-ci, use commit-specific tags"
            if docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:$TARGET_SHA-ci 2>/dev/null; then
              echo "✅ Pulled Frontend:$TARGET_SHA-ci"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:$TARGET_SHA-ci driverev-frontend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:$FRONTEND_TAG 2>/dev/null; then
              echo "✅ Pulled Frontend:$FRONTEND_TAG (component-specific)"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:$FRONTEND_TAG driverev-frontend:test
            else
              echo "❌ Frontend image not found in GHCR"
              echo "⚠️  Tried tags: $TARGET_SHA-ci, $FRONTEND_TAG"
              exit 1
            fi
          else
            echo "   Strategy: main/develop - Use latest-ci if available"
            if docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:latest-ci 2>/dev/null; then
              echo "✅ Pulled Frontend:latest-ci"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:latest-ci driverev-frontend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:$TARGET_SHA-ci 2>/dev/null; then
              echo "✅ Pulled Frontend:$TARGET_SHA-ci"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:$TARGET_SHA-ci driverev-frontend:test
            elif docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:$FRONTEND_TAG 2>/dev/null; then
              echo "✅ Pulled Frontend:$FRONTEND_TAG (component-specific)"
              docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:$FRONTEND_TAG driverev-frontend:test
            else
              echo "❌ Frontend image not found in GHCR"
              echo "⚠️  Tried tags: latest-ci, $TARGET_SHA-ci, $FRONTEND_TAG"
              exit 1
            fi
          fi
          echo "🏷️  Tagged as driverev-frontend:test for docker compose"

      # Phase 7: --no-pull 不要（既に Pull + Tag 済み）
      - name: Start services with Docker Compose
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          PROJECT=devrev-${{ github.run_id }}
          # Phase 7: --no-pull 削除（ローカルタグ driverev-backend:test を使用）
          docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 240 backend

      - name: Show backend logs if startup failed
        if: failure() && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true')
        run: |
          PROJECT=devrev-${{ github.run_id }}
          echo "========== Backend Container Logs =========="
          docker compose -f .github/compose.ci.yml -p "$PROJECT" logs backend || true
          echo "========== Backend Container Status =========="
          docker compose -f .github/compose.ci.yml -p "$PROJECT" ps || true
          echo "========== Backend Container Inspect =========="
          docker inspect $(docker compose -f .github/compose.ci.yml -p "$PROJECT" ps -q backend) 2>/dev/null || echo "Container not found"

      - name: Run integration tests
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true'
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" exec backend curl -fsS http://localhost:8000/health
          echo "Backend health check passed"

      - name: Cleanup
        if: always() && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.docker == 'true')
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" down

  # コード解析（オプション、スケジュール実行など）
  code-analysis:
    name: Extended Code Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install analysis tools
        run: |
          pip install radon xenon bandit
          pip install -r backend/requirements.txt

      - name: Run complexity analysis
        continue-on-error: true
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc backend/app/ -a
          echo "=== Maintainability Index ==="
          radon mi backend/app/ -a

      - name: Run security analysis
        continue-on-error: true
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-analysis-report-${{ github.sha }}
          path: |
            bandit-report.json

  # デプロイメント（条件分岐：develop→staging, main→production）
  # 条件: docker-integrationが成功した場合は常に実行
  # デプロイジョブ内でVM上のバージョンとGHCR上のバージョンを比較し、
  # 同じならスキップ、違ったらデプロイ実行
  # これにより、変更なし+前回デプロイ失敗のリカバリーも対応
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [detect-changes, docker-integration]
    if: >
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || !inputs.skip_deploy) &&
      (needs.docker-integration.result == 'success' || needs.docker-integration.result == 'skipped')
    permissions:
      contents: read
      packages: write # GHCR push用

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Set deployment environment (production only)
      - name: Set deployment environment
        id: env
        run: |
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "vm_name=free-vm01" >> $GITHUB_OUTPUT

      # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: compute

      # Get production VM IP
      - name: Get GCE external IP
        id: gce-ip
        run: |
          IP=$(gcloud compute instances describe free-vm01 \
            --zone=us-west1-b \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          if [ -z "$IP" ]; then
            echo "VM external IP not found (is the VM running?)" >&2
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Using production VM IP: $IP"

      # Setup Docker Buildx for multi-platform builds
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Phase 7: Production Frontend は build-and-push ワークフローで既にビルド済み
      # Note: build-and-push.yml で動的 IP を使ってビルド & GHCR に Push 済み
      # ここではビルド不要、後で VM 内から GHCR Pull のみ実行

      # Prepare production app directory
      - name: Prepare production app directory
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euxo pipefail
            rm -rf ~/app
            mkdir -p ~/app

      - name: Copy compose file and scripts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: ".github/compose.ci.yml,scripts/generate-production-env.sh,scripts/cleanup-old-images.sh,scripts/rollback.sh"
          target: "~/app"
          strip_components: 0

      # Create secure environment file on VM
      - name: Create secure environment file
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/app

            # Create .env.secrets securely (not exposed in process list or logs)
            cat > .env.secrets << 'SECRETS_EOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            SECRETS_EOF

            chmod 600 .env.secrets
            echo "✅ Secure environment file created"

      - name: Deploy and start services
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/app

            # Load secrets from secure file
            source .env.secrets
            export DB_PASSWORD SECRET_KEY EMAIL_HOST EMAIL_USER EMAIL_PASSWORD

            # Generate production environment file
            VM_IP="${{ steps.gce-ip.outputs.ip }}"
            echo "🔧 Generating production .env with IP: $VM_IP"
            chmod +x scripts/generate-production-env.sh
            ./scripts/generate-production-env.sh "$VM_IP"

            # Cleanup secrets file immediately after use
            rm -f .env.secrets

            # Note: GHCR authentication not required
            # This is a public repository - GHCR images can be pulled without authentication
            # Reference: docs/CICD_REFACTORING.md#ghcr-pullの権限管理

            # Check if deployment is needed by comparing VM and GHCR versions
            echo "🔍 Checking if deployment is needed..."

            # Get currently running container versions on VM
            CURRENT_BACKEND_VERSION=$(docker inspect driverev-production-backend-1 --format='{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "none")
            CURRENT_FRONTEND_VERSION=$(docker inspect driverev-production-frontend-1 --format='{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "none")

            # Get target versions from GHCR
            TARGET_BACKEND_VERSION="${{ needs.docker-integration.outputs.backend_version_with_sha }}"
            TARGET_FRONTEND_VERSION="${{ needs.docker-integration.outputs.frontend_version_with_sha }}"

            echo "📊 Version Comparison:"
            echo "  Backend:  VM=$CURRENT_BACKEND_VERSION  GHCR=$TARGET_BACKEND_VERSION"
            echo "  Frontend: VM=$CURRENT_FRONTEND_VERSION GHCR=$TARGET_FRONTEND_VERSION"

            # Check if deployment is needed
            if [ "$CURRENT_BACKEND_VERSION" = "$TARGET_BACKEND_VERSION" ] && [ "$CURRENT_FRONTEND_VERSION" = "$TARGET_FRONTEND_VERSION" ]; then
              echo "✅ VM versions match GHCR versions - deployment not needed"
              echo "🎉 System is already up to date!"
              exit 0
            else
              echo "🚀 Versions differ - proceeding with deployment"
            fi

            # Pull images from GHCR with version tagging
            # Uses component-specific versions for accurate tracking
            BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/driverev-backend"
            FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/driverev-frontend"
            VERSION="${{ needs.docker-integration.outputs.version }}"
            BACKEND_VERSION_WITH_SHA="${{ needs.docker-integration.outputs.backend_version_with_sha }}"
            FRONTEND_VERSION_WITH_SHA="${{ needs.docker-integration.outputs.frontend_version_with_sha }}"
            CURRENT_SHA="${{ github.sha }}"

            echo "🔍 Pulling images for deployment"
            echo "📌 Base Version: $VERSION"
            echo "📌 Backend Version: $BACKEND_VERSION_WITH_SHA"
            echo "📌 Frontend Version: $FRONTEND_VERSION_WITH_SHA"

            # Pull and tag backend image
            # Priority: component-specific SHA > base version > global SHA > latest
            # Handles cases: build success, GHCR push failure, previous deploy failure
            if docker pull "$BACKEND_IMAGE:$BACKEND_VERSION_WITH_SHA" 2>/dev/null; then
              echo "✅ Backend image: $BACKEND_VERSION_WITH_SHA (component-specific)"
              docker tag "$BACKEND_IMAGE:$BACKEND_VERSION_WITH_SHA" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$BACKEND_VERSION_WITH_SHA" "driverev-backend:test"
            elif docker pull "$BACKEND_IMAGE:$VERSION" 2>/dev/null; then
              echo "✅ Backend image: $VERSION (base version)"
              docker tag "$BACKEND_IMAGE:$VERSION" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$VERSION" "driverev-backend:test"
            elif docker pull "$BACKEND_IMAGE:$CURRENT_SHA" 2>/dev/null; then
              echo "⚠️  Backend image: $CURRENT_SHA (global SHA fallback)"
              docker tag "$BACKEND_IMAGE:$CURRENT_SHA" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:$CURRENT_SHA" "driverev-backend:test"
            elif docker pull "$BACKEND_IMAGE:latest" 2>/dev/null; then
              echo "⚠️  Backend image: latest (emergency fallback)"
              docker tag "$BACKEND_IMAGE:latest" "driverev-backend:$VERSION"
              docker tag "$BACKEND_IMAGE:latest" "driverev-backend:test"
            else
              echo "❌ No backend image found in GHCR - deployment cannot proceed"
              exit 1
            fi

            # Pull and tag frontend image (prod version with dynamic API URL)
            # Priority: component-specific SHA-prod > base version-prod > global SHA-prod > latest-prod
            if docker pull "$FRONTEND_IMAGE:$FRONTEND_VERSION_WITH_SHA-prod" 2>/dev/null; then
              echo "✅ Frontend image: $FRONTEND_VERSION_WITH_SHA-prod (component-specific)"
              docker tag "$FRONTEND_IMAGE:$FRONTEND_VERSION_WITH_SHA-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$FRONTEND_VERSION_WITH_SHA-prod" "driverev-frontend:test"
            elif docker pull "$FRONTEND_IMAGE:$VERSION-prod" 2>/dev/null; then
              echo "✅ Frontend image: $VERSION-prod (base version)"
              docker tag "$FRONTEND_IMAGE:$VERSION-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$VERSION-prod" "driverev-frontend:test"
            elif docker pull "$FRONTEND_IMAGE:$CURRENT_SHA-prod" 2>/dev/null; then
              echo "⚠️  Frontend image: $CURRENT_SHA-prod (global SHA fallback)"
              docker tag "$FRONTEND_IMAGE:$CURRENT_SHA-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:$CURRENT_SHA-prod" "driverev-frontend:test"
            elif docker pull "$FRONTEND_IMAGE:latest-prod" 2>/dev/null; then
              echo "⚠️  Frontend image: latest-prod (emergency fallback)"
              docker tag "$FRONTEND_IMAGE:latest-prod" "driverev-frontend:$VERSION"
              docker tag "$FRONTEND_IMAGE:latest-prod" "driverev-frontend:test"
            else
              echo "❌ No frontend image found in GHCR - deployment cannot proceed"
              exit 1
            fi

            # Deploy to production
            PROJECT="devrev-production"
            echo "🚀 Starting deployment..."

            # Stop existing deployment
            docker compose -f .github/compose.ci.yml -p "$PROJECT" down --remove-orphans || true

            # Start new deployment
            set -a
            source .env
            set +a
            docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 300

            echo "✅ Deployment complete!"
            echo "🌐 Frontend: http://$VM_IP:3000"
            echo "🔌 Backend API: http://$VM_IP:8000"

            # Show status
            docker compose -f .github/compose.ci.yml -p "$PROJECT" ps

            # Cleanup old images (keep most recent 3 versions)
            echo "🧹 Cleaning up old Docker images..."
            chmod +x scripts/cleanup-old-images.sh
            ./scripts/cleanup-old-images.sh 3 || echo "⚠️  Image cleanup skipped (non-critical)"

            # Verify deployed versions
            echo ""
            echo "🔍 Deployed Version Verification:"
            echo "Expected Git Commit: $CURRENT_SHA"
            echo "Expected Build ID: $VERSION_WITH_SHA"
            echo ""

            # Check backend version
            echo "Backend build info:"
            docker compose -p "$PROJECT" -f .github/compose.ci.yml exec -T backend cat /app/build-info.txt 2>/dev/null || echo "⚠️  Backend build-info.txt not found"

            # Check frontend version
            echo ""
            echo "Frontend build info:"
            docker compose -p "$PROJECT" -f .github/compose.ci.yml exec -T frontend cat /app/build-info.txt 2>/dev/null || echo "⚠️  Frontend build-info.txt not found"

            echo ""
            echo "✅ Production deployment completed successfully"
            echo "📦 Current version: $VERSION"

  # 品質レポート生成
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs:
      [
        backend-quality,
        frontend-quality,
        frontend-build-test,
        backend-build-test,
        docker-integration,
      ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Generate quality summary
        run: |
          echo "# CI/CD Quality Summary" > summary.md
          echo "Generated on: $(date)" >> summary.md
          echo "" >> summary.md
          echo "## Job Results" >> summary.md
          echo "- Backend Code Quality: ${{ needs.backend-quality.result }}" >> summary.md
          echo "- Frontend Code Quality: ${{ needs.frontend-quality.result }}" >> summary.md
          echo "- Frontend Build & Test: ${{ needs.frontend-build-test.result }}" >> summary.md
          echo "- Backend Tests & Build: ${{ needs.backend-build-test.result }}" >> summary.md
          echo "- Docker Integration: ${{ needs.docker-integration.result }}" >> summary.md
          echo "" >> summary.md
          echo "## Performance Metrics" >> summary.md
          echo "- Total execution time: $(date)" >> summary.md

      - name: Upload quality summary
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary-${{ github.sha }}
          path: summary.md
