name: Optimized CI/CD Pipeline

permissions: {}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run on"
        required: false
        default: "develop"
      skip_deploy:
        description: "Skip deployment step"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  POSTGRES_PASSWORD: postgres123
  SECRET_KEY: test-secret-key
  FORCE_CACHE_REFRESH: "true"

jobs:
  # 変更検知 - どのコンポーネントが変更されたかを判定
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'backend/requirements.txt'
            frontend:
              - 'frontend/**'
              - 'frontend/package*.json'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - '.github/compose.ci.yml'
            ci:
              - '.github/workflows/**'

  # Backend品質チェック（ブランチプロテクション要件）
  backend-quality:
    name: Backend Code Quality v2
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        working-directory: ./backend
        run: flake8 app/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run black
        working-directory: ./backend
        run: black --check app/

      - name: Run isort
        working-directory: ./backend
        run: isort --check-only --profile=black app/

  # Frontend品質チェック
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run lint
        working-directory: ./frontend
        run: npm run lint

      - name: Run type-check
        working-directory: ./frontend
        run: npm run type-check

  # フロントエンドテスト・ビルド
  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-quality]
    if: |
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      needs.frontend-quality.result == 'success' &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # バックエンドテスト
  backend-build-test:
    name: Backend Tests & Build
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-quality]
    if: |
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      needs.backend-quality.result == 'success' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true')
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: driverev_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:${{ env.POSTGRES_PASSWORD }}@localhost:5432/driverev_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # Docker統合ビルド・テスト (GHCR最適化版)
  docker-integration:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build-test, backend-build-test]
    if: |
      always() &&
      !cancelled() &&
      (needs.frontend-build-test.result == 'success' || needs.frontend-build-test.result == 'skipped') &&
      (needs.backend-build-test.result == 'success' || needs.backend-build-test.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.docker == 'true' || needs.detect-changes.outputs.ci == 'true') &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: write  # GHCR push用

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend: ビルド (integration test用)
      - name: Build backend image for testing
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: driverev-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backend: GHCR push (main only)
      - name: Push backend image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/driverev-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/driverev-backend:latest
          cache-from: type=gha

      # Frontend: ビルド (integration test用)
      - name: Build frontend image for testing
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: driverev-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend: GHCR push (main only)
      - name: Push frontend image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/driverev-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/driverev-frontend:latest
          cache-from: type=gha

      - name: Start services with Docker Compose
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 240 backend

      - name: Run integration tests
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" exec backend curl -fsS http://localhost:8000/health
          echo "Backend health check passed"

      - name: Cleanup
        if: always()
        run: |
          PROJECT=devrev-${{ github.run_id }}
          docker compose -f .github/compose.ci.yml -p "$PROJECT" down

  # コード解析（オプション、スケジュール実行など）
  code-analysis:
    name: Extended Code Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install analysis tools
        run: |
          pip install radon xenon bandit
          pip install -r backend/requirements.txt

      - name: Run complexity analysis
        continue-on-error: true
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc backend/app/ -a
          echo "=== Maintainability Index ==="
          radon mi backend/app/ -a

      - name: Run security analysis
        continue-on-error: true
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-analysis-report-${{ github.sha }}
          path: |
            bandit-report.json

  # デプロイメント（条件分岐：develop→staging, main→production）
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [docker-integration]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || !inputs.skip_deploy)
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Set deployment environment (production only)
      - name: Set deployment environment
        id: env
        run: |
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "vm_name=free-vm01" >> $GITHUB_OUTPUT

      # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: compute

      # Get production VM IP
      - name: Get GCE external IP
        id: gce-ip
        run: |
          IP=$(gcloud compute instances describe free-vm01 \
            --zone=us-west1-b \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          if [ -z "$IP" ]; then
            echo "VM external IP not found (is the VM running?)" >&2
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Using production VM IP: $IP"

      # Prepare production app directory
      - name: Prepare production app directory
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euxo pipefail
            rm -rf ~/app
            mkdir -p ~/app

      - name: Copy compose file and scripts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: ".github/compose.ci.yml,scripts/generate-production-env.sh"
          target: "~/app"
          strip_components: 0

      - name: Deploy and start services
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.gce-ip.outputs.ip }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euxo pipefail
            cd ~/app

            # Generate production environment file with current VM IP
            VM_IP="${{ steps.gce-ip.outputs.ip }}"
            echo "🔧 Generating production .env with IP: $VM_IP"
            
            chmod +x scripts/generate-production-env.sh
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            EMAIL_HOST="${{ secrets.EMAIL_HOST }}" \
            EMAIL_USER="${{ secrets.EMAIL_USER }}" \
            EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}" \
            ./scripts/generate-production-env.sh "$VM_IP"

            # Pull images from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/driverev-backend:${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/driverev-frontend:${{ github.sha }}

            # Tag for compose
            docker tag ghcr.io/${{ github.repository_owner }}/driverev-backend:${{ github.sha }} driverev-backend:test
            docker tag ghcr.io/${{ github.repository_owner }}/driverev-frontend:${{ github.sha }} driverev-frontend:test

            # Deploy to production
            PROJECT="devrev-production"

            # Stop existing deployment
            docker compose -f .github/compose.ci.yml -p "$PROJECT" down --remove-orphans || true

            # Start new deployment with generated .env
            docker compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 240
            
            echo "✅ Deployment complete!"
            echo "🌐 Frontend: http://$VM_IP:3000"
            echo "🔌 Backend API: http://$VM_IP:8000"

            echo "=== Deployment Status ==="
            docker compose -f .github/compose.ci.yml -p "$PROJECT" ps

            echo "=== Container Health Status ==="
            docker inspect ${PROJECT}-frontend-1 --format='{{.Name}}: {{.State.Health.Status}}' || echo "Frontend inspection failed"
            docker inspect ${PROJECT}-backend-1 --format='{{.Name}}: {{.State.Health.Status}}' || echo "Backend inspection failed"

            echo "=== Frontend Logs (last 50 lines) ==="
            docker compose -f .github/compose.ci.yml -p "$PROJECT" logs frontend --tail 50

            echo "=== Backend Logs (last 30 lines) ==="
            docker compose -f .github/compose.ci.yml -p "$PROJECT" logs backend --tail 30

            echo "Production deployment completed successfully"

  # 品質レポート生成
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, frontend-build-test, backend-build-test, docker-integration]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Generate quality summary
        run: |
          echo "# CI/CD Quality Summary" > summary.md
          echo "Generated on: $(date)" >> summary.md
          echo "" >> summary.md
          echo "## Job Results" >> summary.md
          echo "- Backend Code Quality: ${{ needs.backend-quality.result }}" >> summary.md
          echo "- Frontend Code Quality: ${{ needs.frontend-quality.result }}" >> summary.md
          echo "- Frontend Build & Test: ${{ needs.frontend-build-test.result }}" >> summary.md
          echo "- Backend Tests & Build: ${{ needs.backend-build-test.result }}" >> summary.md
          echo "- Docker Integration: ${{ needs.docker-integration.result }}" >> summary.md
          echo "" >> summary.md
          echo "## Performance Metrics" >> summary.md
          echo "- Total execution time: $(date)" >> summary.md

      - name: Upload quality summary
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary-${{ github.sha }}
          path: summary.md