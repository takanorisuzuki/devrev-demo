name: Workflow Name Validation

# ブランチ保護ルールとワークフロー"ジョブ名"の一致を検証
# Push/PR時に自動実行され、不一致があればCIを失敗させる

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

permissions:
  contents: read

jobs:
  validate-workflow-names:
    name: Validate Workflow Names
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Extract job names from workflows
        id: extract-names
        run: |
          echo "🔍 ワークフローファイルからジョブ名を抽出中..."

          JOB_NAMES=()
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" && ! "$file" =~ \.disabled$ ]]; then
              echo "📄 ファイル: $file"
              
              # 各ジョブの name フィールドを抽出
              job_names=$(yq eval '.jobs.*.name' "$file" 2>/dev/null | grep -v '^null$' | grep -v '^---$' || echo "")
              
              if [[ -n "$job_names" ]]; then
                while IFS= read -r job_name; do
                  if [[ -n "$job_name" ]]; then
                    echo "  ✓ ジョブ: '$job_name'"
                    JOB_NAMES+=("$job_name")
                  fi
                done <<< "$job_names"
              fi
            fi
          done

          # JSON配列として保存
          printf '%s\n' "${JOB_NAMES[@]}" | jq -R . | jq -s . > /tmp/job_names.json
          echo ""
          echo "✅ 抽出されたジョブ名:"
          cat /tmp/job_names.json | jq -r '.[]' | sed 's/^/  - /'

      - name: Check branch protection rules
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo ""
          echo "🔒 ブランチ保護ルールを確認中..."

          ERRORS=0
          WARNINGS=0

          # main と develop の保護ルールをチェック
          for branch in main develop; do
            echo ""
            echo "📋 ブランチ: $branch"
            
            # ブランチ保護ルールを取得
            PROTECTION=$(gh api "repos/${{ github.repository }}/branches/$branch/protection" 2>/dev/null || echo "{}")
            
            if [[ "$PROTECTION" == "{}" ]]; then
              echo "  ⚠️  保護ルールが設定されていません（スキップ）"
              continue
            fi
            
            # 必須ステータスチェックを抽出
            REQUIRED_CHECKS=$(echo "$PROTECTION" | jq -r '.required_status_checks.contexts[]? // empty' 2>/dev/null)
            
            if [[ -z "$REQUIRED_CHECKS" ]]; then
              echo "  ⚠️  警告: 必須ステータスチェックが設定されていません"
              echo "  💡 本番環境では必須チェックを設定することを推奨します"
              echo "  📖 参考: https://docs.github.com/ja/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/about-protected-branches"
              WARNINGS=$((WARNINGS + 1))
              continue
            fi
            
            echo "  必須ステータスチェック:"
            JOB_NAMES=$(cat /tmp/job_names.json)
            
            while IFS= read -r check; do
              echo "    - $check"
              
              # ジョブ名と一致するか確認
              MATCH=$(echo "$JOB_NAMES" | jq --arg check "$check" 'map(select(. == $check)) | length')
              
              if [[ "$MATCH" -eq 0 ]]; then
                echo "      ❌ エラー: このステータスチェック名に一致するジョブが存在しません！"
                ERRORS=$((ERRORS + 1))
              else
                echo "      ✓ 一致するジョブが存在します"
              fi
            done <<< "$REQUIRED_CHECKS"
          done

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "❌ 検証失敗: $ERRORS 個の不一致が見つかりました"
            echo ""
            echo "📝 利用可能なジョブ名:"
            cat /tmp/job_names.json | jq -r '.[]' | sed 's/^/  - /'
            echo ""
            echo "💡 修正方法:"
            echo "   1. ワークフローファイルの 'jobs.<job_id>.name' を必須チェック名に変更"
            echo "   2. または、ブランチ保護ルールの必須チェック名を実際のジョブ名に変更"
            echo ""
            exit 1
          elif [[ $WARNINGS -gt 0 ]]; then
            echo "⚠️  検証完了（警告あり）: $WARNINGS 件の警告が見つかりました"
            echo ""
            echo "💡 推奨事項:"
            echo "   - 本番ブランチ（main/develop）には必須ステータスチェックを設定してください"
            echo "   - これにより、重要なチェックが完了するまでマージを防止できます"
            echo ""
            echo "✅ ジョブ名の不一致はありません"
          else
            echo "✅ すべてのジョブ名がブランチ保護ルールと一致しています"
          fi
