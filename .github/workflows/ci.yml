name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  POSTGRES_PASSWORD: postgres123
  SECRET_KEY: test-secret-key
  FORCE_CACHE_REFRESH: 'true'

jobs:
  # フロントエンド（Next.js）のテストとビルド
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Type check
      working-directory: ./frontend
      run: npm run type-check

    - name: Lint
      working-directory: ./frontend
      run: npm run lint

    - name: Run tests
      working-directory: ./frontend
      run: npm run test

    - name: Build application
      working-directory: ./frontend
      run: npm run build

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./frontend/coverage
        flags: frontend
        name: frontend-coverage

  # バックエンド（FastAPI）のテストとビルド
  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: driverev_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting
      working-directory: ./backend
      run: |
        flake8 app/
        black --check app/
        isort --check-only app/
        mypy app/

    - name: Run tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:${{ env.POSTGRES_PASSWORD }}@localhost:5432/driverev_test_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: ${{ env.SECRET_KEY }}
        ENVIRONMENT: test
      run: |
        pytest --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./backend
        flags: backend
        name: backend-coverage

  # Podman ビルドテスト
  podman-build:
    name: Podman Build Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Configure Podman for rootless
      run: |
        echo 'unqualified-search-registries = ["docker.io"]' | sudo tee -a /etc/containers/registries.conf
        sudo chmod 644 /etc/containers/registries.conf

    - name: Build backend image with Podman
      run: |
        podman build -t driverev-backend:test ./backend

    - name: Build frontend image with Podman
      run: |
        podman build -t driverev-frontend:test ./frontend

    - name: Test images
      run: |
        podman images
        podman inspect driverev-backend:test
        podman inspect driverev-frontend:test

  # 統合テスト（Podman Compose）
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [podman-build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Configure Podman for rootless
      run: |
        echo 'unqualified-search-registries = ["docker.io"]' | sudo tee -a /etc/containers/registries.conf
        sudo chmod 644 /etc/containers/registries.conf

    - name: Start services with Podman Compose
      run: |
        podman compose -f compose.yml up -d postgres redis
        sleep 15

    - name: Run integration tests
      run: |
        # バックエンドのヘルスチェック
        podman compose -f compose.yml run --rm backend python -c "
        import requests
        import time
        time.sleep(5)
        response = requests.get('http://backend:8000/health')
        assert response.status_code == 200
        print('Backend health check passed')
        "

    - name: Cleanup
      if: always()
      run: podman compose -f compose.yml down

  # デプロイ（mainブランチのみ）
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, podman-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        # ここに実際のデプロイスクリプトを追加
        # 例: AWS ECS、Google Cloud Run、Heroku等へのデプロイ
        echo "✅ Deployment completed successfully"

