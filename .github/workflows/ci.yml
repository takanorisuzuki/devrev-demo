name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  POSTGRES_PASSWORD: postgres123
  SECRET_KEY: test-secret-key
  FORCE_CACHE_REFRESH: 'true'

jobs:
  # フロントエンド（Next.js）のテストとビルド
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Type check
      working-directory: ./frontend
      run: |
        echo "Current directory: $(pwd)"
        echo "Files in lib directory:"
        ls -la lib/
        echo "TypeScript configuration:"
        cat tsconfig.json
        echo "Running type check with verbose output:"
        npx tsc --noEmit --listFiles | head -20

    - name: Lint
      working-directory: ./frontend
      run: npm run lint

    - name: Run tests with coverage
      working-directory: ./frontend
      run: npm run test:coverage

    - name: Build application
      working-directory: ./frontend
      run: npm run build

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        directory: ./frontend/coverage
        flags: frontend
        name: frontend-coverage

  # バックエンド（FastAPI）のテストとビルド
  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: driverev_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting
      working-directory: ./backend
      run: |
        flake8 app/ --max-line-length=88 --extend-ignore=E203,W503
        black --check app/
        isort --check-only --profile=black app/
        mypy app/

    - name: Run tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:${{ env.POSTGRES_PASSWORD }}@localhost:5432/driverev_test_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: ${{ env.SECRET_KEY }}
        ENVIRONMENT: test
      run: |
        pytest --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        directory: ./backend
        flags: backend
        name: backend-coverage

  # Podman ビルドテスト
  podman-build:
    name: Podman Build Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Podman 5.5.0
      uses: redhat-actions/setup-podman@v1
      with:
        version: '5.5.0'

    - name: Build backend image with Podman
      run: |
        podman build -t driverev-backend:test ./backend

    - name: Build frontend image with Podman
      run: |
        podman build -t driverev-frontend:test ./frontend

    - name: Test images
      run: |
        podman images
        podman inspect driverev-backend:test
        podman inspect driverev-frontend:test

    - name: Export images as artifacts
      run: |
        podman save -o backend.tar driverev-backend:test
        podman save -o frontend.tar driverev-frontend:test

    - name: Upload podman images
      uses: actions/upload-artifact@v4
      with:
        name: podman-images
        path: |
          backend.tar
          frontend.tar

  # 統合テスト（Podman Compose）
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [podman-build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Podman 5.5.0
      uses: redhat-actions/setup-podman@v1
      with:
        version: '5.5.0'

    - name: Download podman images
      uses: actions/download-artifact@v4
      with:
        name: podman-images

    - name: Load podman images
      run: |
        podman load -i backend.tar
        podman load -i frontend.tar

    - name: Start services with Podman Compose
      run: |
        PROJECT=devrev-${{ github.run_id }}
        podman compose -f .github/compose.ci.yml -p "$PROJECT" up -d --wait --wait-timeout 180 backend

    - name: Run integration tests
      run: |
        PROJECT=devrev-${{ github.run_id }}
        # backend のヘルスチェック（コンテナ内のcurlで確認）
        podman compose -f .github/compose.ci.yml -p "$PROJECT" exec backend curl -fsS http://localhost:8000/health
        echo "Backend health check passed"

    - name: Cleanup
      if: always()
      run: |
        PROJECT=devrev-${{ github.run_id }}
        podman compose -f .github/compose.ci.yml -p "$PROJECT" down

  # デプロイ（mainブランチのみ）
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, podman-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        # ここに実際のデプロイスクリプトを追加
        # 例: AWS ECS、Google Cloud Run、Heroku等へのデプロイ
        echo "✅ Deployment completed successfully"
