name: "DevRev Demo CodeQL Configuration"

# プロジェクト構造に適合したCodeQL設定
# backend: Python (FastAPI)
# frontend: TypeScript/JavaScript (Next.js)

# パス設定
paths:
  - backend/app
  - frontend/src
  - frontend/pages
  - frontend/components
  - frontend/lib

# 除外パス
paths-ignore:
  - "**/node_modules/**"
  - "**/tests/**"
  - "**/test/**"
  - "**/__tests__/**"
  - "**/coverage/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/*.min.js"
  - "**/*.d.ts"
  - "**/migrations/**"
  - "**/alembic/**"
  - "**/*.test.*"
  - "**/*.spec.*"

# 無効化するクエリ（必要に応じて調整）
disable-default-queries: false

# カスタムクエリパック（必要に応じて）
# queries:
#   - uses: security-and-quality

# 言語別設定
languages:
  - python
  - javascript

# ビルド設定（JavaScript/TypeScript用）
# autobuild: true

# Python依存関係設定
# python-setup:
#   requirements-file: backend/requirements.txt