version: 2
updates:
  # Python dependencies (Backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "backend"
      - "auto-merge-candidate"
    ignore:
      # Block major version updates by default (require manual review)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Node.js dependencies (Frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
      - "auto-merge-candidate"
    ignore:
      # Block dependencies explicitly for non-LTS versions  
      - dependency-name: "@types/node"
        versions: [">=25.0.0"]
      # Block major version updates by default (require manual review)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "ci/cd"
      - "auto-merge-candidate"
    ignore:
      # Block major version updates (require manual review)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker dependencies - Backend
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "backend"
      - "auto-merge-candidate"
    ignore:
      # Block updates to new minor (non-LTS) or major versions.
      # This allows patch updates for the current LTS (e.g., 3.12.x).
      - dependency-name: "python"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  # Docker dependencies - Frontend  
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
      - "auto-merge-candidate"
    ignore:
      # Block major Node.js updates (maintain LTS policy)
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]