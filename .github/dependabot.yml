# Common configuration anchors
x-common-deps:
  schedule: &schedule
    interval: "weekly"
    day: "monday"
    time: "09:00"
    timezone: "Asia/Tokyo"
  reviewers: &reviewers
    - "takanorisuzuki"
  assignees: &assignees
    - "takanorisuzuki"
  commit-message: &commit_message
    prefix: "chore"
    include: "scope"
  ignore-major: &ignore_major
    - dependency-name: "*"
      update-types: ["version-update:semver-major"]

version: 2
updates:
  # Python dependencies (Backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule: *schedule
    open-pull-requests-limit: 5
    reviewers: *reviewers
    assignees: *assignees
    commit-message: *commit_message
    labels:
      - "dependencies"
      - "python"
      - "backend"
      - "auto-merge-candidate"
    ignore: *ignore_major

  # Node.js dependencies (Frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule: *schedule
    open-pull-requests-limit: 5
    reviewers: *reviewers
    assignees: *assignees
    commit-message: *commit_message
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
      - "auto-merge-candidate"
    ignore:
      - dependency-name: "@types/node"
        versions: [">=25.0.0", "23.*", "21.*", "19.*", "17.*", "15.*", "13.*"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker base images - Backend
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule: *schedule
    open-pull-requests-limit: 3
    reviewers: *reviewers
    assignees: *assignees
    commit-message: *commit_message
    labels:
      - "dependencies"
      - "docker"
      - "backend"
      - "security"
    ignore: *ignore_major

  # Docker base images - Frontend
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule: *schedule
    open-pull-requests-limit: 3
    reviewers: *reviewers
    assignees: *assignees
    commit-message: *commit_message
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
      - "security"
    ignore: *ignore_major

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: *schedule
    open-pull-requests-limit: 3
    reviewers: *reviewers
    assignees: *assignees
    commit-message: *commit_message
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    ignore: *ignore_major