# Release Branch Protection Configuration

## 🛡️ release/* ブランチ保護設定

### 基本設定
```yaml
branch_pattern: "release/*"
description: "リリース準備用ブランチ"
protection_level: "moderate"
```

### 保護ルール

#### 1. プルリクエスト必須
```yaml
require_pull_request: true
require_approvals: 1
dismiss_stale_reviews: true
require_code_owner_reviews: false
require_conversation_resolution: true
```

#### 2. ステータスチェック必須
```yaml
required_status_checks:
  strict: true
  contexts:
    - "CI Pipeline"
    - "Code Quality"
    - "Security Scan"
    - "Build"
    - "E2E Tests"
    - "Performance Tests"
```

#### 3. ブランチの最新性
```yaml
require_branches_up_to_date: true
require_linear_history: false
```

#### 4. コミット署名
```yaml
require_signed_commits: true
```

#### 5. 管理者制限
```yaml
include_administrators: true
restrict_pushes: true
allow_force_pushes: false
allow_deletions: false
```

### ステータスチェック詳細

#### CI Pipeline
- **目的**: すべてのテストが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend, docker-build, integration-test

#### Code Quality
- **目的**: コード品質チェックが成功することを確認
- **ワークフロー**: `.github/workflows/quality.yml`
- **必須ジョブ**: frontend-quality, backend-quality, complexity-check

#### Security Scan
- **目的**: セキュリティスキャンが成功することを確認
- **ワークフロー**: `.github/workflows/security.yml`
- **必須ジョブ**: dependency-scan, code-security-scan, codeql-analysis

#### Build
- **目的**: アプリケーションのビルドが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend

#### E2E Tests
- **目的**: エンドツーエンドテストが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: integration-test

#### Performance Tests
- **目的**: パフォーマンステストが成功することを確認
- **ワークフロー**: `.github/workflows/quality.yml`
- **必須ジョブ**: performance-check

### リリースフロー

#### 1. リリースブランチの作成
```bash
# develop ブランチからリリースブランチを作成
git checkout develop
git pull origin develop
git checkout -b release/v1.0.0
git push origin release/v1.0.0
```

#### 2. リリース準備
- **バージョン番号の更新**
  ```bash
  # package.json の更新
  npm version 1.0.0
  
  # requirements.txt の更新
  # バージョン情報の更新
  ```

- **ドキュメントの更新**
  ```bash
  # CHANGELOG.md の更新
  # README.md の更新
  # APIドキュメントの更新
  ```

- **最終テストの実行**
  ```bash
  # 全テストの実行
  npm run test
  python -m pytest
  
  # 手動テストの実施
  # パフォーマンステストの実行
  ```

#### 3. リリースブランチの統合
- **develop ブランチへのマージ**
  ```bash
  # リリースブランチの変更をdevelopにマージ
  git checkout develop
  git merge release/v1.0.0
  git push origin develop
  ```

- **main ブランチへのマージ**
  ```bash
  # リリースブランチの変更をmainにマージ
  git checkout main
  git merge release/v1.0.0
  git tag v1.0.0
  git push origin main
  git push origin v1.0.0
  ```

#### 4. リリースブランチの削除
```bash
# リリースブランチの削除
git branch -d release/v1.0.0
git push origin --delete release/v1.0.0
```

