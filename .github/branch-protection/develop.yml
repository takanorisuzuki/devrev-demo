# Develop Branch Protection Configuration

## 🛡️ develop ブランチ保護設定

### 基本設定
```yaml
branch_name: "develop"
description: "開発中の機能を統合するブランチ"
protection_level: "moderate"
```

### 保護ルール

#### 1. プルリクエスト必須
```yaml
require_pull_request: true
require_approvals: 1
dismiss_stale_reviews: true
require_code_owner_reviews: false
require_conversation_resolution: true
```

#### 2. ステータスチェック必須
```yaml
required_status_checks:
  strict: true
  contexts:
    - "CI Pipeline"
    - "Code Quality"
    - "Security Scan"
    - "Build"
```

#### 3. ブランチの最新性
```yaml
require_branches_up_to_date: true
require_linear_history: false
```

#### 4. コミット署名
```yaml
require_signed_commits: true
```

#### 5. 管理者制限
```yaml
include_administrators: true
restrict_pushes: true
allow_force_pushes: false
allow_deletions: false
```

### ステータスチェック詳細

#### CI Pipeline
- **目的**: 基本的なテストが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend, docker-build

#### Code Quality
- **目的**: コード品質チェックが成功することを確認
- **ワークフロー**: `.github/workflows/quality.yml`
- **必須ジョブ**: frontend-quality, backend-quality

#### Security Scan
- **目的**: 基本的なセキュリティスキャンが成功することを確認
- **ワークフロー**: `.github/workflows/security.yml`
- **必須ジョブ**: dependency-scan, code-security-scan

#### Build
- **目的**: アプリケーションのビルドが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend

### レビュー設定

#### 必須承認者数
- **最小承認者数**: 1人
- **理由**: 開発効率を保ちつつ品質を確保

#### コードオーナーレビュー
- **必須**: いいえ
- **理由**: 開発効率を優先

#### 古いレビューの無効化
- **設定**: 有効
- **理由**: 新しいコミットが追加された場合、レビューを再実行

### 開発フロー

#### 機能開発
1. **feature ブランチを作成**
   ```bash
   git checkout develop
   git pull origin develop
   git checkout -b feature/new-feature
   ```

2. **開発を実装**
   ```bash
   # 機能を実装
   git add .
   git commit -S -m "feat: 新機能の実装"
   ```

3. **プルリクエストを作成**
   - ベースブランチ: `develop`
   - テンプレート: `feature_pr.yml` を使用
   - ラベル: `enhancement`, `frontend` または `backend`

#### バグ修正
1. **bugfix ブランチを作成**
   ```bash
   git checkout develop
   git pull origin develop
   git checkout -b bugfix/fix-issue
   ```

2. **修正を実装**
   ```bash
   # バグを修正
   git add .
   git commit -S -m "fix: バグ修正の詳細"
   ```

3. **プルリクエストを作成**
   - ベースブランチ: `develop`
   - テンプレート: `bugfix_pr.yml` を使用
   - ラベル: `bug`, `frontend` または `backend`

### 統合テスト

#### 自動統合
- **develop ブランチへのマージ後**
- **CI/CDパイプラインが自動実行**
- **統合テストの結果を確認**

#### 手動統合テスト
- **重要な機能の場合**
- **手動での動作確認**
- **パフォーマンステスト**

### リリース準備

#### develop → main へのマージ
1. **release ブランチを作成**
   ```bash
   git checkout develop
   git pull origin develop
   git checkout -b release/v1.0.0
   ```

2. **リリース準備**
   - バージョン番号の更新
   - ドキュメントの更新
   - 最終テストの実行

3. **main ブランチへのマージ**
   - プルリクエストを作成
   - 厳重なレビューを実施
   - 承認後にマージ

### 設定の適用

#### GitHub Web UI
1. リポジトリの「Settings」→「Branches」
2. 「Add rule」をクリック
3. ブランチ名: `develop`
4. 上記の設定を適用
5. 「Create」をクリック

#### GitHub CLI
```bash
gh api repos/:owner/:repo/branches/develop/protection \
  --method PUT \
  --field required_status_checks='{"strict":true,"contexts":["CI Pipeline","Code Quality","Security Scan","Build"]}' \
  --field enforce_admins=true \
  --field required_pull_request_reviews='{"required_approving_review_count":1,"dismiss_stale_reviews":true}' \
  --field restrictions=null \
  --field required_conversation_resolution=true \
  --field allow_force_pushes=false \
  --field allow_deletions=false
```

### 監視とアラート

#### 監視項目
- プルリクエストの承認待ち時間
- ステータスチェックの失敗率
- 統合テストの成功率

#### アラート設定
- ステータスチェック失敗時の通知
- 長時間承認待ちのプルリクエスト
- 統合テスト失敗時の通知

### 効果

#### 開発効率
- 適度な保護で開発速度を維持
- 自動テストによる品質確保
- チーム内での知識共有

#### 品質管理
- コードレビューの実施
- 自動テストの実行
- セキュリティチェックの実施

#### リスク管理
- 直接プッシュの防止
- 未テストコードの統合防止
- セキュリティホールの早期発見
