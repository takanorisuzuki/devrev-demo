# Main Branch Protection Configuration

## 🛡️ main ブランチ保護設定（ソロ開発最適化）

### 基本設定
```yaml
branch_name: "main"
description: "本番環境にデプロイされる安定版ブランチ（ソロ開発向け）"
protection_level: "moderate"
```

### 実際の保護ルール

#### 1. プルリクエスト必須（自己承認可）
```yaml
require_pull_request: true
require_approvals: 0  # ソロ開発最適化: 自己承認可
dismiss_stale_reviews: true
require_code_owner_reviews: false  # ソロ開発では無効
require_conversation_resolution: true
```

#### 2. ステータスチェック必須
```yaml
required_status_checks:
  strict: true
  contexts:
    - "CI/CD Pipeline"
    - "Code Quality Checks v2"
    - "Security Scan"
```

#### 3. ブランチの最新性
```yaml
require_branches_up_to_date: true  # 最新でないとマージ不可
require_linear_history: false  # ソロ開発では柔軟に
```

#### 4. コミット署名
```yaml
require_signed_commits: false  # ソロ開発では任意
```

#### 5. 管理者制限
```yaml
include_administrators: true  # 管理者も従う
restrict_pushes: true
allow_force_pushes: false
allow_deletions: false
```

### ステータスチェック詳細

#### CI Pipeline
- **目的**: すべてのテストが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend, docker-build, integration-test

#### Code Quality
- **目的**: コード品質チェックが成功することを確認
- **ワークフロー**: `.github/workflows/quality.yml`
- **必須ジョブ**: frontend-quality, backend-quality, complexity-check

#### Security Scan
- **目的**: セキュリティスキャンが成功することを確認
- **ワークフロー**: `.github/workflows/security.yml`
- **必須ジョブ**: dependency-scan, code-security-scan, codeql-analysis

#### Build
- **目的**: アプリケーションのビルドが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: frontend, backend

#### E2E Tests
- **目的**: エンドツーエンドテストが成功することを確認
- **ワークフロー**: `.github/workflows/ci.yml`
- **必須ジョブ**: integration-test

### レビュー設定

#### 必須承認者数
- **最小承認者数**: 2人
- **理由**: コードの品質とセキュリティを確保

#### コードオーナーレビュー
- **必須**: はい
- **CODEOWNERS ファイル**: `.github/CODEOWNERS`

#### 古いレビューの無効化
- **設定**: 有効
- **理由**: 新しいコミットが追加された場合、レビューを再実行

### 緊急時の対応

#### 緊急修正プロセス
1. **hotfix ブランチを作成**
   ```bash
   git checkout main
   git pull origin main
   git checkout -b hotfix/emergency-fix
   ```

2. **修正を実装**
   ```bash
   # 修正をコミット
   git add .
   git commit -S -m "hotfix: 緊急修正の詳細"
   ```

3. **プルリクエストを作成**
   - タイトル: `[HOTFIX] 緊急修正の概要`
   - テンプレート: `hotfix_pr.yml` を使用
   - ラベル: `hotfix`, `priority:high`

4. **緊急レビュー**
   - 管理者による緊急レビュー
   - 必要に応じて保護ルールを一時解除

#### 保護ルールの一時解除
```bash
# GitHub CLI を使用
gh api repos/:owner/:repo/branches/main/protection \
  --method DELETE \
  --header "Accept: application/vnd.github.v3+json"
```

### 監視とアラート

#### 監視項目
- プルリクエストの承認待ち時間
- ステータスチェックの失敗率
- 直接プッシュの試行回数

#### アラート設定
- ステータスチェック失敗時の通知
- 長時間承認待ちのプルリクエスト
- 保護ルール違反の試行

### 設定の適用

#### GitHub Web UI
1. リポジトリの「Settings」→「Branches」
2. 「Add rule」をクリック
3. ブランチ名: `main`
4. 上記の設定を適用
5. 「Create」をクリック

#### GitHub CLI
```bash
gh api repos/:owner/:repo/branches/main/protection \
  --method PUT \
  --field required_status_checks='{"strict":true,"contexts":["CI Pipeline","Code Quality","Security Scan","Build","E2E Tests"]}' \
  --field enforce_admins=true \
  --field required_pull_request_reviews='{"required_approving_review_count":2,"dismiss_stale_reviews":true,"require_code_owner_reviews":true}' \
  --field restrictions=null \
  --field required_conversation_resolution=true \
  --field required_linear_history=true \
  --field allow_force_pushes=false \
  --field allow_deletions=false
```

